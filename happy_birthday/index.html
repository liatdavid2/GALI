<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinder Video</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app {
  width:100%;
  max-width:420px;
}

.card {
  position:relative;
  background:#000;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  touch-action:none;
}

iframe {
  width:100%;
  height:420px;
  border:none;
  pointer-events:none; /* important for swipe */
}

.overlay {
  position:absolute;
  inset:0;
}

.actions {
  display:flex;
  justify-content:space-around;
  padding:15px;
}

button {
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:24px;
  cursor:pointer;
}

.yes { background:#28a745; }
.no { background:#dc3545; }

.label {
  position:absolute;
  top:20px;
  left:20px;
  font-size:30px;
  opacity:0;
  transition:0.3s;
}

</style>
</head>

<body>

<div class="app">
  <div id="card" class="card">
    <iframe id="player" allowfullscreen></iframe>
    <div class="overlay"></div>
    <div id="label" class="label"></div>
  </div>

  <div class="actions">
    <button class="no" onclick="vote('no')">✖</button>
    <button class="yes" onclick="vote('yes')">✔</button>
  </div>
</div>

<script>

const videos = [
  "xs62_c-YfRc",
  "tTU-H6SlxOU",
  "a49y-NMDpDk"
];

let index = 0;
const player = document.getElementById("player");
const label = document.getElementById("label");
const card = document.getElementById("card");

function loadVideo(){
  if(index >= videos.length){
    card.innerHTML = "<h2 style='text-align:center;padding:50px'>נגמרו הסרטונים</h2>";
    return;
  }
  player.src = `https://www.youtube.com/embed/${videos[index]}?autoplay=1&mute=1`;
}

function vote(type){
  label.innerText = type === 'yes' ? "YES" : "NO";
  label.style.opacity = 1;

  animateOut(type);

  setTimeout(()=>{
    label.style.opacity = 0;
    index++;
    resetCard();
    loadVideo();
  },300);

  saveVote(type);
}

function saveVote(type){
  const data = JSON.parse(localStorage.getItem("votes") || "[]");
  data.push({ video: videos[index], decision: type });
  localStorage.setItem("votes", JSON.stringify(data));
}

// swipe
let startX = 0;
let currentX = 0;
let dragging = false;

card.addEventListener("pointerdown", e => {
  dragging = true;
  startX = e.clientX;
});

card.addEventListener("pointermove", e => {
  if(!dragging) return;

  currentX = e.clientX - startX;
  card.style.transform = `translateX(${currentX}px) rotate(${currentX/10}deg)`;

  if(currentX > 50){
    label.innerText = "YES";
    label.style.opacity = 1;
  } else if(currentX < -50){
    label.innerText = "NO";
    label.style.opacity = 1;
  } else {
    label.style.opacity = 0;
  }
});

card.addEventListener("pointerup", ()=>{
  dragging = false;

  if(currentX > 100) vote('yes');
  else if(currentX < -100) vote('no');
  else resetCard();
});

function animateOut(type){
  const direction = type === 'yes' ? 1 : -1;
  card.style.transition = "0.3s";
  card.style.transform = `translateX(${direction*500}px) rotate(${direction*30}deg)`;
}

function resetCard(){
  card.style.transition = "0.3s";
  card.style.transform = "translateX(0) rotate(0)";
  setTimeout(()=> card.style.transition = "",300);
}

loadVideo();

</script>

</body>
</html>
