<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pink Star TV</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.25) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.18) 0 2px, transparent 3px),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,0.22) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.18) 0 2px, transparent 3px),
        linear-gradient(135deg, #ff4da6, #7b2ff7, #ff9a3c);
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 25% 40%, rgba(255,255,255,0.8) 0 1.5px, transparent 3px),
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.7) 0 1px, transparent 2px),
        radial-gradient(circle at 76% 26%, rgba(255,255,255,0.8) 0 1.5px, transparent 3px),
        radial-gradient(circle at 88% 60%, rgba(255,255,255,0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 20% 82%, rgba(255,255,255,0.8) 0 1.5px, transparent 3px),
        radial-gradient(circle at 60% 78%, rgba(255,255,255,0.8) 0 1px, transparent 2px);
      animation: twinkle 3s infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at 15% 60%, rgba(255,230,120,0.9) 0 2px, transparent 4px),
        radial-gradient(circle at 35% 22%, rgba(255,230,120,0.85) 0 2px, transparent 4px),
        radial-gradient(circle at 65% 40%, rgba(255,230,120,0.85) 0 2px, transparent 4px),
        radial-gradient(circle at 82% 18%, rgba(255,230,120,0.9) 0 2px, transparent 4px),
        radial-gradient(circle at 90% 78%, rgba(255,230,120,0.8) 0 2px, transparent 4px);
      filter: drop-shadow(0 0 8px rgba(255, 221, 87, 0.9));
      animation: sparkle 2.5s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.45; }
      to { opacity: 1; }
    }

    @keyframes sparkle {
      from { opacity: 0.5; transform: scale(1); }
      to { opacity: 1; transform: scale(1.03); }
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      padding-bottom: 40px;
    }

    header {
      text-align: center;
      padding: 24px 16px 10px;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
      color: #fff6b0;
      text-shadow:
        0 0 8px #fff,
        0 0 18px #ff4da6,
        0 0 35px #ff4da6;
    }

    header p {
      margin: 8px 0 0;
      font-size: 18px;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px;
    }

    nav button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4da6, #ff7ad9, #ffd84d);
      box-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 18px rgba(255,77,166,0.8),
        0 0 30px rgba(255,216,77,0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    nav button::before {
      content: "";
      position: absolute;
      top: -20%;
      left: -30%;
      width: 40%;
      height: 140%;
      background: rgba(255,255,255,0.4);
      transform: rotate(25deg);
      animation: shine 3s infinite;
    }

    nav button:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow:
        0 0 12px rgba(255,255,255,0.7),
        0 0 24px rgba(255,77,166,1),
        0 0 40px rgba(255,216,77,0.9);
    }

    @keyframes shine {
      0% { left: -40%; }
      100% { left: 120%; }
    }

    .page {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .active {
      display: block;
    }

    h2 {
      text-align: center;
      font-size: 32px;
      color: #fff6b0;
      text-shadow:
        0 0 8px #fff,
        0 0 20px #ff4da6,
        0 0 30px #ffd84d;
      margin-bottom: 24px;
    }

    .video-card,
    .gallery-card {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 18px rgba(255,77,166,0.35),
        0 0 36px rgba(123,47,247,0.25);
    }

    .video {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .gallery img {
      width: 100%;
      display: block;
      border-radius: 18px;
      box-shadow:
        0 0 12px rgba(255,255,255,0.35),
        0 0 24px rgba(255,77,166,0.5);
      transition: transform 0.2s ease;
    }

    .gallery img:hover {
      transform: scale(1.04);
    }

    .stars-line {
      text-align: center;
      font-size: 24px;
      margin-bottom: 12px;
      letter-spacing: 10px;
      text-shadow: 0 0 12px #fff, 0 0 20px gold;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 30px;
      }

      h2 {
        font-size: 26px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      nav button {
        font-size: 15px;
        padding: 10px 18px;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrap">
    <header>
      <h1>Pink Star TV</h1>
      <p>Shiny K-POP video site</p>
    </header>

    <nav>
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('dance')">Dance</button>
      <button onclick="showPage('gallery')">Gallery</button>
      <button onclick="showPage('playlist')">Playlist</button>
    </nav>

    <div id="home" class="page active">
      <div class="stars-line">★ ✦ ★ ✦ ★</div>
      <h2>Featured Videos</h2>

      <div class="video-card">
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/JGwWNGJdvx8"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>

      <div class="video-card">
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    </div>

    <div id="dance" class="page">
      <div class="stars-line">✦ ★ ✦ ★ ✦</div>
      <h2>Dance Time</h2>

      <div class="video-card">
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/kJQP7kiw5Fk"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>

      <div class="video-card">
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/RgKAFK5djSk"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    </div>

    <div id="gallery" class="page">
      <div class="stars-line">★ ★ ✦ ★ ★</div>
      <h2>K-POP Gallery</h2>

      <div class="gallery-card">
        <div class="gallery">
          <img src="https://via.placeholder.com/500x320/ff69b4/ffffff?text=Star+1" alt="Star 1">
          <img src="https://via.placeholder.com/500x320/9b5cff/ffffff?text=Star+2" alt="Star 2">
          <img src="https://via.placeholder.com/500x320/ffb347/ffffff?text=Star+3" alt="Star 3">
        </div>
      </div>
    </div>

    <div id="playlist" class="page">
      <div class="stars-line">✦ ✦ ★ ✦ ✦</div>
      <h2>My Playlist</h2>

      <div class="video-card">
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/OPf0YbXqDm0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showPage(pageId) {
      const pages = document.querySelectorAll('.page');
      pages.forEach(page => page.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }
  </script>
</body>
</html>
