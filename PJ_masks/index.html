<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJ Video Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(90deg,#00ff88 0%,#1e90ff 50%,#ff2d55 100%);
}

/* HERO */
.hero {
  position: relative;
  height: 70vh;
  min-height: 500px;
  overflow: hidden;
}

.hero iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* overlay */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

/* hero content */
.hero-content {
  position: absolute;
  bottom: 40px;
  right: 40px;
  z-index: 2;
  max-width: 500px;
}

.hero h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.hero p {
  font-size: 1.1rem;
  opacity: 0.9;
}

/* button */
.btn {
  margin-top: 15px;
  display: inline-block;
  padding: 12px 20px;
  border-radius: 8px;
  background: #ff2d55;
  font-weight: bold;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 40px 20px;
  text-align: center;
}

.section h2 {
  font-size: 2rem;
  margin-bottom: 20px;
}

/* VIDEO CARDS */
.videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

.video-card {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
}

.video-card:hover {
  transform: translateY(-5px);
}

.video-card iframe {
  width: 100%;
  height: 180px;
  border: none;
}

.video-title {
  padding: 10px;
  font-weight: bold;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .hero {
    height: 50vh;
    min-height: 300px;
  }

  .hero-content {
    right: 20px;
    bottom: 20px;
  }

  .hero h1 {
    font-size: 1.6rem;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <iframe
    src="https://www.youtube.com/embed/BEpLqsbAnEM?autoplay=1&mute=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="hero-content">
    <h1>הרפתקה מתחילה כאן</h1>
    <p>צפו בסרטון המרכזי והצטרפו לעולם של גיבורים צבעוניים</p>
    <div class="btn">▶ צפו עכשיו</div>
  </div>
</div>

<!-- VIDEOS -->
<div class="section">
  <h2>🎬 סרטונים נוספים</h2>

  <div class="videos">

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/YhYBe4WMEMU"></iframe>
      <div class="video-title">ילד חתול</div>
    </div>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/b4W6Tgjha8Q"></iframe>
      <div class="video-title">גיאקו</div>
    </div>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/GDe2DBYEX3I"></iframe>
      <div class="video-title">ינשופונת</div>
    </div>

        <div class="video-card">
      <iframe src="https://www.youtube.com/embed/obkKy8FeJ6Y"></iframe>
      <div class="video-title">פיגי רובוט</div>
    </div>
  </div>
</div>

</body>
</html>
